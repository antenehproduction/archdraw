name: Fetch Socrata schemas

# Fetches dataset metadata for every Socrata permit endpoint registered in
# data/permit-registry.js and opens a PR with the result.
#
# Why GitHub Actions: agent egress and several browser sessions are blocked
# from the WA municipal Socrata endpoints (Cloudflare anti-scrape wall).
# GitHub Actions runners use a different IP allocation that the same hosts
# do not block, so this workflow is the only fully-automated path to keep
# the permit-registry's _unverifiedEndpoint flags accurate.
#
# Why PR-not-push: every schema update lands as a reviewable PR. If a host
# is hijacked and returns a malicious payload, the bot can never overwrite
# source files — the diff is only data/_socrata-schemas.json (metadata,
# never executed) and a human gates the merge.
#
# Trigger:
#   - push touching the workflow, the fetch scripts, or the registry
#   - daily at 09:00 UTC (catches schema drift)
#   - workflow_dispatch
on:
  push:
    paths:
      - '.github/workflows/fetch-schemas.yml'
      - 'scripts/fetch-socrata-schemas.py'
      - 'scripts/sync-permit-registry.py'
      - 'data/permit-registry.js'
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write          # push the bot/schema-update-* branch
  pull-requests: write     # open the PR

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch Socrata schemas
        run: python3 scripts/fetch-socrata-schemas.py

      - name: Open PR if schemas changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- data/_socrata-schemas.json; then
            echo "No schema changes — nothing to do."
            exit 0
          fi
          DATE=$(date -u +%Y%m%d-%H%M)
          BRANCH="bot/schema-update-${DATE}"
          git config user.name  "archdraw-bot"
          git config user.email "archdraw-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/_socrata-schemas.json
          git commit -m "fetch-schemas: refresh Socrata metadata (${DATE})"
          git push origin "$BRANCH"
          gh pr create \
            --title "[bot] fetch-schemas: refresh Socrata metadata (${DATE})" \
            --body "$(cat <<'BODY'
          Auto-generated by .github/workflows/fetch-schemas.yml.

          Diff is data/_socrata-schemas.json only — pure metadata, never
          executed at runtime. Quick checks before merging:

          - Column lists look reasonable for permit datasets?
          - `addressFieldGuess` column actually exists on each dataset?
          - No unexpected schema removals (a host could be returning errors)?

          After merge, run locally:

              python3 scripts/sync-permit-registry.py

          to see which permit-registry entries should graduate from
          `_unverifiedEndpoint: true` to live.
          BODY
          )" \
            --base "${BASE_BRANCH}" \
            --head "${BRANCH}"
